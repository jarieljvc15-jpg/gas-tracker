<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Fuel Log</title>
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Fuel Log" />
<meta name="theme-color" content="#15171c" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15171c; --card:#1c1f26; --border:rgba(255,255,255,0.07);
    --text:#e8e6e1; --muted:#8a8d96; --faint:#6e7178;
    --accent:#ff8c42; --accent-text:#15171c; --good:#5ec9a8; --bad:#e0625c;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .wrap{max-width:480px;margin:0 auto;padding-bottom:120px;}
  header{padding:32px 20px 24px;border-bottom:1px solid var(--border);}
  header .row{display:flex;align-items:center;justify-content:space-between;}
  .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);margin:0 0 4px;}
  h1{font-size:24px;font-weight:800;margin:0;letter-spacing:-0.02em;}
  .gauge-wrap{width:80px;height:48px;position:relative;}
  .gauge-wrap svg{width:100%;height:100%;overflow:visible;}
  .needle{transform-origin:50px 50px;transition:transform .6s ease;filter:drop-shadow(0 0 6px rgba(255,140,66,.55));}
  .gauge-label{position:absolute;left:0;right:0;bottom:0;text-align:center;font-size:10px;color:var(--muted);}
  main{padding:24px 20px;}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;}
  .stat-card .label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-bottom:8px;}
  .stat-card.accent .label{color:var(--good);}
  .stat-card .value{font-size:18px;font-weight:700;}
  .stat-card .sub{font-size:11px;color:var(--faint);margin-top:2px;}
  .empty{text-align:center;padding:56px 16px;border:1px dashed var(--border);border-radius:16px;}
  .empty svg{margin-bottom:12px;color:var(--accent);}
  .empty p:first-of-type{font-size:14px;color:#c8c6c1;margin:0 0 4px;}
  .empty p:last-of-type{font-size:12px;color:var(--muted);margin:0;}
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin:0 0 12px;}
  .entry{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .entry .top{display:flex;align-items:center;gap:8px;margin-bottom:2px;flex-wrap:wrap;}
  .entry .cost{font-size:14px;font-weight:600;}
  .entry .date{font-size:12px;color:var(--faint);}
  .badge{font-size:10px;padding:2px 6px;border-radius:6px;background:rgba(255,255,255,.05);color:var(--muted);}
  .entry .meta{display:flex;gap:12px;font-size:12px;color:var(--muted);}
  .entry .meta .kml{color:var(--good);}
  .entry .station{display:flex;align-items:center;gap:4px;margin-top:4px;font-size:12px;color:var(--faint);}
  .entry .station svg{flex-shrink:0;}
  .del-btn{background:none;border:none;color:var(--faint);padding:8px;cursor:pointer;}
  .del-btn:hover{color:var(--bad);}
  .fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:var(--accent);color:var(--accent-text);font-weight:600;font-size:15px;padding:14px 22px;border-radius:999px;border:none;box-shadow:0 4px 20px rgba(255,140,66,.35);cursor:pointer;}
  .fab:active{transform:translateX(-50%) scale(.96);}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
  @media(min-width:600px){.overlay{align-items:center;}}
  .modal{background:var(--card);width:100%;max-width:400px;border-radius:24px 24px 0 0;border-top:1px solid var(--border);padding:24px;max-height:90vh;overflow-y:auto;}
  @media(min-width:600px){.modal{border-radius:16px;border:1px solid var(--border);}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .modal-head h2{font-size:18px;font-weight:700;margin:0;}
  .close-btn{background:none;border:none;color:var(--muted);padding:4px;cursor:pointer;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;}
  .field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 12px;font-size:14px;color:var(--text);outline:none;}
  .field input:focus{border-color:var(--accent);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .checkrow{display:flex;align-items:center;gap:10px;padding:4px 0 2px;cursor:pointer;}
  .checkrow input{width:16px;height:16px;accent-color:var(--accent);}
  .hint{font-size:11px;color:var(--faint);margin:-8px 0 14px;}
  .error{font-size:12px;color:var(--bad);margin:0 0 12px;}
  .submit-btn{width:100%;background:var(--accent);color:var(--accent-text);font-weight:600;font-size:15px;padding:13px;border:none;border-radius:12px;cursor:pointer;}
  .submit-btn:active{transform:scale(.98);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="row">
      <div>
        <p class="eyebrow">Fuel Log</p>
        <h1>My Car</h1>
      </div>
      <div class="gauge-wrap">
        <svg viewBox="0 0 100 55">
          <path d="M 8 50 A 42 42 0 0 1 92 50" fill="none" stroke="#2a2d35" stroke-width="6" stroke-linecap="round"/>
          <path id="gaugeFill" d="M 8 50 A 42 42 0 0 1 92 50" fill="none" stroke="#ff8c42" stroke-width="6" stroke-linecap="round" stroke-dasharray="0 132" opacity="0.85"/>
          <g id="needle" class="needle">
            <line x1="50" y1="50" x2="50" y2="14" stroke="#ff8c42" stroke-width="2.5" stroke-linecap="round"/>
          </g>
          <circle cx="50" cy="50" r="3.5" fill="#ff8c42"/>
        </svg>
        <div class="gauge-label" id="gaugeLabel">—</div>
      </div>
    </div>
  </header>

  <main>
    <div class="stats" id="stats" style="display:none;">
      <div class="stat-card">
        <div class="label">📅 This month</div>
        <div class="value" id="monthSpend">—</div>
        <div class="sub" id="monthLiters"></div>
      </div>
      <div class="stat-card accent">
        <div class="label">📈 Avg efficiency</div>
        <div class="value" id="avgKml">—</div>
        <div class="sub" id="entryCount"></div>
      </div>
    </div>

    <div class="empty" id="emptyState">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 22h12M9 22V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v18M9 9h6M19 7l-3-3 1.5-1.5L21 6v9a1.5 1.5 0 0 1-3 0V9"/></svg>
      <p>No fill-ups yet</p>
      <p>Log your first one to start tracking spend and efficiency.</p>
    </div>

    <div id="historySection" style="display:none;">
      <p class="section-label">History</p>
      <div id="entryList"></div>
    </div>
  </main>
</div>

<button class="fab" onclick="openForm()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  Log fill-up
</button>

<div class="overlay" id="overlay" style="display:none;">
  <form class="modal" id="form" onsubmit="submitForm(event)">
    <div class="modal-head">
      <h2>Log fill-up</h2>
      <button type="button" class="close-btn" onclick="closeForm()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="field">
      <label>Date</label>
      <input type="date" id="f-date" />
    </div>
    <div class="field">
      <label>Odometer (km)</label>
      <input type="number" inputmode="decimal" id="f-odo" placeholder="e.g. 45230" />
    </div>
    <div class="grid2">
      <div class="field">
        <label>Liters</label>
        <input type="number" inputmode="decimal" step="0.01" id="f-liters" placeholder="0.00" />
      </div>
      <div class="field">
        <label>Cost (₱)</label>
        <input type="number" inputmode="decimal" step="0.01" id="f-cost" placeholder="0.00" />
      </div>
    </div>
    <div class="field">
      <label>Gas station (optional)</label>
      <input type="text" id="f-station" placeholder="e.g. Shell Aguinaldo Hwy" />
    </div>
    <label class="checkrow">
      <input type="checkbox" id="f-full" checked />
      <span style="font-size:14px;color:#c8c6c1;">Filled to full tank</span>
    </label>
    <p class="hint">Efficiency (km/L) is calculated between full-tank fill-ups, so toggle this off for partial top-ups.</p>
    <p class="error" id="formError" style="display:none;"></p>
    <button type="submit" class="submit-btn">Save fill-up</button>
  </form>
</div>

<script>
const STORAGE_KEY = 'fuel_entries_v1';

function loadEntries(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }catch(e){ return []; }
}
function saveEntries(entries){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmtMoney(n){ return '₱' + Number(n).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(iso){
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

let entries = loadEntries();

function computeEfficiency(sortedByOdo){
  let lastFullOdo = null;
  return sortedByOdo.map(e=>{
    let kml = null;
    if(lastFullOdo !== null && e.odometer > lastFullOdo){
      kml = (e.odometer - lastFullOdo) / e.liters;
    }
    if(e.full) lastFullOdo = e.odometer;
    return {...e, kml};
  });
}

function render(){
  const sorted = [...entries].sort((a,b)=> a.odometer - b.odometer);
  const withEff = computeEfficiency(sorted);
  const display = [...withEff].sort((a,b)=> b.odometer - a.odometer);

  // stats
  const statsEl = document.getElementById('stats');
  const emptyEl = document.getElementById('emptyState');
  const historyEl = document.getElementById('historySection');
  const listEl = document.getElementById('entryList');

  if(entries.length === 0){
    statsEl.style.display = 'none';
    emptyEl.style.display = 'block';
    historyEl.style.display = 'none';
    updateGauge(null);
    return;
  }
  emptyEl.style.display = 'none';
  statsEl.style.display = 'grid';
  historyEl.style.display = 'block';

  const now = new Date();
  const thisMonth = entries.filter(e=>{
    const d = new Date(e.date+'T00:00:00');
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  });
  const monthSpend = thisMonth.reduce((s,e)=> s+Number(e.cost), 0);
  const monthLiters = thisMonth.reduce((s,e)=> s+Number(e.liters), 0);
  const effs = withEff.filter(e=> e.kml !== null).map(e=> e.kml);
  const avgKml = effs.length ? effs.reduce((a,b)=>a+b,0)/effs.length : null;
  const lastKml = effs.length ? effs[effs.length-1] : null;

  document.getElementById('monthSpend').textContent = fmtMoney(monthSpend);
  document.getElementById('monthLiters').textContent = monthLiters.toFixed(1) + ' L';
  document.getElementById('avgKml').textContent = avgKml ? avgKml.toFixed(1)+' km/L' : '—';
  document.getElementById('entryCount').textContent = entries.length + ' fill-ups logged';

  updateGauge(lastKml ?? avgKml);

  listEl.innerHTML = display.map(e=>`
    <div class="entry">
      <div style="flex:1;min-width:0;">
        <div class="top">
          <span class="cost">${fmtMoney(e.cost)}</span>
          <span class="date">${fmtDate(e.date)}</span>
          ${!e.full ? '<span class="badge">partial</span>' : ''}
        </div>
        <div class="meta mono">
          <span>${e.liters} L</span>
          <span>${e.odometer.toLocaleString()} km</span>
          ${e.kml ? `<span class="kml">${e.kml.toFixed(1)} km/L</span>` : ''}
        </div>
        ${e.station ? `<div class="station"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-7.5 8-13a8 8 0 1 0-16 0c0 5.5 8 13 8 13z"/><circle cx="12" cy="9" r="2.5"/></svg><span>${e.station}</span></div>` : ''}
      </div>
      <button class="del-btn" onclick="removeEntry('${e.id}')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V6h12z"/></svg>
      </button>
    </div>
  `).join('');
}

function updateGauge(ref){
  const min=5, max=25;
  const labelEl = document.getElementById('gaugeLabel');
  if(!ref){
    document.getElementById('gaugeFill').setAttribute('stroke-dasharray','0 132');
    document.getElementById('needle').style.transform = 'rotate(-90deg)';
    labelEl.textContent = '—';
    return;
  }
  const clamped = Math.max(min, Math.min(max, ref));
  const pct = (clamped-min)/(max-min);
  const angle = -90 + pct*180;
  document.getElementById('gaugeFill').setAttribute('stroke-dasharray', `${pct*132} 132`);
  document.getElementById('needle').style.transform = `rotate(${angle}deg)`;
  labelEl.textContent = ref.toFixed(1)+' km/L';
}

function openForm(){
  document.getElementById('formError').style.display='none';
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-odo').value = '';
  document.getElementById('f-liters').value = '';
  document.getElementById('f-cost').value = '';
  document.getElementById('f-station').value = '';
  document.getElementById('f-full').checked = true;
  document.getElementById('overlay').style.display = 'flex';
}
function closeForm(){
  document.getElementById('overlay').style.display = 'none';
}

function submitForm(ev){
  ev.preventDefault();
  const date = document.getElementById('f-date').value;
  const odo = Number(document.getElementById('f-odo').value);
  const liters = Number(document.getElementById('f-liters').value);
  const cost = Number(document.getElementById('f-cost').value);
  const station = document.getElementById('f-station').value.trim();
  const full = document.getElementById('f-full').checked;
  const errEl = document.getElementById('formError');

  if(!date || !odo || !liters || !cost){
    errEl.textContent = 'Fill in date, odometer, liters, and cost.';
    errEl.style.display='block';
    return;
  }
  const sorted = [...entries].sort((a,b)=> a.odometer-b.odometer);
  const lastOdo = sorted.length ? sorted[sorted.length-1].odometer : 0;
  if(sorted.length && odo <= lastOdo){
    errEl.textContent = `Odometer must be greater than your last reading (${lastOdo.toLocaleString()} km).`;
    errEl.style.display='block';
    return;
  }
  entries.push({id:uid(), date, odometer:odo, liters, cost, station, full});
  saveEntries(entries);
  closeForm();
  render();
}

function removeEntry(id){
  entries = entries.filter(e=> e.id !== id);
  saveEntries(entries);
  render();
}

render();
</script>
</body>
</html>
